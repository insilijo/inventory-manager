<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FSFN SMS" />
  <title>SMS Simulator · FSFN Inventory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f8f7f4; --surface:#fff; --border:rgba(0,0,0,0.1);
      --text:#1a1a18; --muted:#6b6b67; --hint:#9a9a96;
      --green:#1D9E75; --amber:#BA7517; --red:#E24B4A; --blue:#185FA5;
      --green-bg:#EAF3DE; --amber-bg:#FAEEDA; --red-bg:#FCEBEB; --blue-bg:#E6F1FB;
      --radius:10px;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      background: var(--surface); border-bottom: 0.5px solid var(--border);
      padding: 0 14px; min-height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; gap: 8px;
    }
    header h1 { font-size: 14px; font-weight: 500; }
    header nav {
      display: flex; align-items: center; gap: 12px; overflow-x: auto;
      -webkit-overflow-scrolling: touch; flex: 1; justify-content: flex-end;
    }
    header nav a {
      font-size: 12px; color: var(--muted); text-decoration: none;
      white-space: nowrap; padding: 4px 0;
    }
    header nav a:hover { color: var(--text); }
    header nav a.current { color: var(--text); font-weight: 500; }

    main { max-width: 600px; margin: 0 auto; padding: 14px; }

    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
    h2 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }

    /* From-number row: collapsed by default, expandable */
    .from-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      font-size: 12px; color: var(--muted);
    }
    .from-row .label { white-space: nowrap; }
    .from-row .value { font-weight: 500; color: var(--text); }
    .from-row .edit-btn { font-size: 12px; padding: 4px 8px; color: var(--muted); }
    .from-row input { display: none; flex: 1; }
    .from-row.editing input { display: block; }
    .from-row.editing .value, .from-row.editing .edit-btn { display: none; }

    /* Big body textarea — primary input for the page */
    textarea#body {
      width: 100%; font-family: inherit; font-size: 16px; padding: 12px;
      border: 0.5px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--text);
      min-height: 130px; resize: vertical;
    }
    textarea#body:focus { outline: none; border-color: var(--text); }

    /* iOS: any input <16px font auto-zooms. Force 16px everywhere a thumb hits. */
    input.from-input { width: 100%; font-family: inherit; font-size: 16px; padding: 10px 12px;
                       border: 0.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); }
    input.from-input:focus { outline: none; border-color: var(--text); }

    /* Quick templates as chips, wrap nicely */
    .quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .quick button {
      font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 18px;
      background: var(--bg); color: var(--text); border: 0.5px solid var(--border);
      cursor: pointer;
    }
    .quick button:active { background: var(--border); }

    /* Send button: big, full-width on mobile, prominent */
    .send-row { display: flex; gap: 8px; margin-top: 14px; }
    .send-row button {
      flex: 1;
      font-family: inherit; font-size: 16px; font-weight: 500;
      padding: 14px; border-radius: 10px;
      background: var(--text); color: white; border: none;
      cursor: pointer;
    }
    .send-row button:disabled { opacity: 0.5; }
    .send-row button.secondary {
      background: var(--surface); color: var(--muted);
      border: 0.5px solid var(--border); flex: 0 0 auto; padding: 14px 18px;
    }

    .hint { color: var(--hint); font-size: 11px; margin-top: 8px; text-align: center; }

    /* Result panel */
    .result { margin-top: 14px; }
    .result-status {
      font-size: 12px; padding: 4px 10px; border-radius: 4px;
      display: inline-block; margin-bottom: 8px;
    }
    .ok-status  { background: var(--green-bg); color: var(--green); }
    .err-status { background: var(--red-bg);   color: var(--red);   }
    pre {
      background: var(--bg); padding: 10px 12px; border-radius: 8px; font-size: 12px;
      white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow: auto;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }

    /* Recent activity, collapsed by default */
    details.feed-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0; }
    details.feed-card summary {
      list-style: none; padding: 12px 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 500;
    }
    details.feed-card summary::-webkit-details-marker { display: none; }
    details.feed-card summary .count { font-size: 11px; color: var(--muted); }
    details.feed-card[open] summary { border-bottom: 0.5px solid var(--border); }
    .feed { list-style: none; padding: 0 14px 8px; max-height: 380px; overflow-y: auto; }
    .feed li {
      display: flex; gap: 10px; padding: 10px 0;
      border-bottom: 0.5px solid var(--border); align-items: flex-start;
    }
    .feed li:last-child { border-bottom: none; }
    .feed-dot {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; margin-top: 1px;
    }
    .dot-green { background: var(--green-bg); color: var(--green); }
    .dot-blue  { background: var(--blue-bg);  color: var(--blue);  }
    .dot-amber { background: var(--amber-bg); color: var(--amber); }
    .dot-red   { background: var(--red-bg);   color: var(--red);   }
    .feed-note { font-size: 13px; }
    .feed-raw  { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 1px; }
    .feed-meta { font-size: 10px; color: var(--hint); margin-top: 1px; }

    .toast {
      position: fixed; left: 50%; bottom: calc(20px + env(safe-area-inset-bottom));
      transform: translateX(-50%); background: var(--text); color: white;
      padding: 10px 18px; border-radius: 999px; font-size: 13px;
      opacity: 0; transition: opacity 0.2s; z-index: 100;
      pointer-events: none;
    }
    .toast.show { opacity: 0.95; }

    /* On wider screens, give the textarea a bit more breathing room and keep the page narrow */
    @media (min-width: 740px) {
      main { padding: 24px; }
      textarea#body { min-height: 160px; font-size: 15px; }
      .send-row button { font-size: 15px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>FSFN · Simulator</h1>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/inventory">Inventory</a>
      <a href="/history">History</a>
      <a href="/simulator" class="current">Simulator</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <div class="from-row" id="from-row">
        <span class="label">From</span>
        <span class="value" id="from-value">+15555550100</span>
        <button class="edit-btn" id="from-edit" type="button">Change</button>
        <input class="from-input" id="from" type="tel" inputmode="tel" value="+15555550100" />
      </div>

      <textarea id="body" placeholder="Type the message a volunteer would send…" autocomplete="off" autocorrect="on" autocapitalize="sentences" enterkeyhint="send"></textarea>

      <div class="quick">
        <button data-tpl="at downtown got 3 lemon boxes A grade">📦 Restock</button>
        <button data-tpl="east side: 45 lbs apples kinda bruised">⚖️ +Weight</button>
        <button data-tpl="sold $180 today at downtown">💵 Sales</button>
        <button data-tpl="used 2 bread loaves gave out 5 mixed greens east side">📤 Usage</button>
        <button data-tpl="served 80 people today at downtown">👤 Attendance</button>
        <button data-tpl="got 4 dragonfruit boxes at warehouse">❓ Unknown</button>
      </div>

      <div class="send-row">
        <button class="primary" id="send-btn" type="button">Send</button>
        <button class="secondary" id="clear-btn" type="button">Clear</button>
      </div>
      <div class="hint">Send by tapping the button or pressing the keyboard's Send/Enter key.</div>

      <div id="result" class="result" style="display:none;">
        <span class="result-status" id="result-status"></span>
        <pre id="result-body"></pre>
      </div>
    </div>

    <details class="feed-card" id="feed-card">
      <summary>
        <span>Recent activity</span>
        <span class="count" id="feed-count">—</span>
      </summary>
      <ul class="feed" id="feed"><li class="feed-meta" style="padding:12px 0;">Loading…</li></ul>
    </details>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }
    function fmtTime(iso) {
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      const diff = Math.round((Date.now() - d) / 1000);
      if (diff < 60)    return `${diff}s ago`;
      if (diff < 3600)  return `${Math.round(diff/60)}m ago`;
      if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
      return d.toLocaleString();
    }

    const _fetch = window.fetch;
    window.fetch = async (...args) => {
      const r = await _fetch(...args);
      if (r.status === 401) {
        location.href = '/login?next=' + encodeURIComponent(location.pathname);
        throw new Error('redirecting to login');
      }
      return r;
    };

    // From-number: remember the last value across sessions
    const fromInput = document.getElementById('from');
    const fromValue = document.getElementById('from-value');
    const fromRow   = document.getElementById('from-row');
    const stored = localStorage.getItem('fsfn-sim-from');
    if (stored) { fromInput.value = stored; fromValue.textContent = stored; }

    document.getElementById('from-edit').addEventListener('click', () => {
      fromRow.classList.add('editing');
      fromInput.focus();
      fromInput.select();
    });
    fromInput.addEventListener('blur', () => {
      const v = fromInput.value.trim() || '+15555550100';
      fromInput.value = v;
      fromValue.textContent = v;
      fromRow.classList.remove('editing');
      localStorage.setItem('fsfn-sim-from', v);
    });

    async function loadFeed() {
      const items = await fetch('/api/feed?limit=15').then(r => r.json());
      document.getElementById('feed-count').textContent = items.length ? `${items.length} events` : 'no events yet';
      const ul = document.getElementById('feed');
      if (!items.length) { ul.innerHTML = '<li class="feed-meta" style="padding:12px 0;">No events yet.</li>'; return; }
      ul.innerHTML = items.map(ev => {
        const p = ev.parsed;
        const note = p?.note || (ev.parse_error ? 'Parse error' : ev.raw_body);
        let icon = '📦', dotClass = 'dot-green';
        if (p?.sale_usd) { icon = '$'; dotClass = 'dot-blue'; }
        else if (ev.parse_error) { icon = '!'; dotClass = 'dot-red'; }
        else if (!p?.changes?.length && !p?.people_count) { icon = '?'; dotClass = 'dot-amber'; }
        else if (p?.people_count) { icon = '👤'; dotClass = 'dot-blue'; }
        const siteTag = p?.site ? ` · ${p.site}` : '';
        return `
          <li>
            <div class="feed-dot ${dotClass}">${icon}</div>
            <div style="flex:1; min-width:0;">
              <div class="feed-note">${note}</div>
              <div class="feed-raw">"${ev.raw_body}"</div>
              <div class="feed-meta">${fmtTime(ev.received_at)} · ${ev.from_number}${siteTag}</div>
            </div>
          </li>`;
      }).join('');
    }

    const bodyEl   = document.getElementById('body');
    const sendBtn  = document.getElementById('send-btn');
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('result-status');
    const respEl   = document.getElementById('result-body');

    async function send() {
      const from = fromInput.value.trim();
      const body = bodyEl.value.trim();
      if (!body) { toast('Type a message first'); bodyEl.focus(); return; }
      sendBtn.disabled = true; sendBtn.textContent = 'Sending…';
      try {
        const r = await fetch('/api/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from, body }),
        });
        const j = await r.json();
        const ok = r.ok && !j.parse_error;
        statusEl.textContent = ok ? `Event #${j.event_id} parsed OK` : (j.parse_error || 'Error');
        statusEl.className = 'result-status ' + (ok ? 'ok-status' : 'err-status');
        respEl.textContent = JSON.stringify(j.parsed ?? j, null, 2);
        resultEl.style.display = 'block';
        if (ok) {
          toast('Sent ✓');
          bodyEl.value = '';
          bodyEl.focus();
        }
        await loadFeed();
      } catch (e) {
        toast('Error: ' + e.message);
      } finally {
        sendBtn.disabled = false; sendBtn.textContent = 'Send';
      }
    }

    sendBtn.addEventListener('click', send);
    document.getElementById('clear-btn').addEventListener('click', () => {
      bodyEl.value = ''; resultEl.style.display = 'none'; bodyEl.focus();
    });
    // Plain Enter sends on mobile keyboards (enterkeyhint=send). Shift+Enter inserts newline.
    bodyEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    document.querySelectorAll('.quick button').forEach(b => {
      b.addEventListener('click', () => {
        bodyEl.value = b.dataset.tpl;
        bodyEl.focus();
        // Place cursor at end
        const v = bodyEl.value; bodyEl.value = ''; bodyEl.value = v;
      });
    });

    bodyEl.focus();
    loadFeed();
    setInterval(loadFeed, 15_000);
  </script>
</body>
</html>
