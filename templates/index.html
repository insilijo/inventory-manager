<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSFN Inventory</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/static/charts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f8f7f4;
      --surface: #ffffff;
      --border:  rgba(0,0,0,0.1);
      --text:    #1a1a18;
      --muted:   #6b6b67;
      --hint:    #9a9a96;
      --green:   #1D9E75;
      --amber:   #BA7517;
      --red:     #E24B4A;
      --blue:    #185FA5;
      --purple:  #6B3FA0;
      --teal:    #167B82;
      --green-bg: #EAF3DE;
      --amber-bg: #FAEEDA;
      --red-bg:   #FCEBEB;
      --blue-bg:  #E6F1FB;
      --radius:  10px;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

    header { background: var(--surface); border-bottom: 0.5px solid var(--border);
             padding: 0 1.5rem; height: 52px; display: flex; align-items: center;
             justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 15px; font-weight: 500; }
    header nav a { font-size: 12px; color: var(--muted); margin-left: 1rem; text-decoration: none; }
    header nav a:hover { color: var(--text); }
    #last-updated { font-size: 12px; color: var(--hint); margin-left: 1rem; }

    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px; margin-bottom: 1.75rem; }
    .stat { background: var(--bg); border-radius: 8px; padding: 0.875rem 1rem; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                  letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .stat-sub    { font-size: 11px; color: var(--hint); margin-top: 3px; }

    section + section { margin-top: 2rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
    .section-title { font-size: 11px; font-weight: 500; color: var(--muted);
                     text-transform: uppercase; letter-spacing: 0.06em; }

    .controls { display: flex; gap: 6px; align-items: center; }
    .toggle-group { display: inline-flex; background: var(--bg); border-radius: 6px; padding: 2px; }
    .toggle-btn { font-size: 11px; padding: 4px 10px; border: none; background: transparent;
                  color: var(--muted); cursor: pointer; border-radius: 4px; font-family: inherit; }
    .toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 0.5px 1px rgba(0,0,0,0.08); }
    select.filter { font-size: 12px; padding: 4px 8px; border: 0.5px solid var(--border);
                    border-radius: 6px; background: var(--surface); color: var(--text);
                    font-family: inherit; }

    .chart-card { background: var(--surface); border: 0.5px solid var(--border);
                  border-radius: var(--radius); padding: 1rem; }
    .chart-wrap { position: relative; height: 280px; }

    .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 10px; }
    .inv-card { background: var(--surface); border: 0.5px solid var(--border);
                border-radius: var(--radius); padding: 0.875rem 1rem;
                cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
    .inv-card:hover { border-color: rgba(0,0,0,0.25); transform: translateY(-1px); }
    .inv-item  { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .inv-time  { font-size: 11px; color: var(--hint); margin-bottom: 10px; }
    .inv-qty   { font-size: 20px; font-weight: 500; }
    .inv-unit  { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 3px; }
    .inv-weight { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .bar-wrap  { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }
    .bar       { height: 3px; border-radius: 2px; transition: width 0.4s; }

    .qty-ok    { color: var(--green); }
    .qty-low   { color: var(--amber); }
    .qty-out   { color: var(--red);   }
    .bar-ok    { background: var(--green); }
    .bar-low   { background: var(--amber); }
    .bar-out   { background: var(--red);   }

    .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px;
             border-radius: 5px; margin-left: 6px; vertical-align: middle; }
    .badge-low { background: var(--amber-bg); color: var(--amber); }
    .badge-out { background: var(--red-bg);   color: var(--red);   }

    .feed { list-style: none; }
    .feed li { display: flex; gap: 10px; padding: 10px 0;
               border-bottom: 0.5px solid var(--border); align-items: flex-start; }
    .feed li:last-child { border-bottom: none; }
    .feed-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
                display: flex; align-items: center; justify-content: center;
                font-size: 13px; margin-top: 1px; }
    .dot-green { background: var(--green-bg); color: var(--green); }
    .dot-blue  { background: var(--blue-bg);  color: var(--blue);  }
    .dot-amber { background: var(--amber-bg); color: var(--amber); }
    .dot-red   { background: var(--red-bg);   color: var(--red);   }
    .feed-note { font-size: 13px; color: var(--text); margin-bottom: 2px; }
    .feed-raw  { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 1px; }
    .feed-meta { font-size: 11px; color: var(--hint); }

    .empty { color: var(--hint); font-size: 13px; padding: 1rem 0; }

    .tot-filter { display: flex; flex-wrap: wrap; gap: 6px 14px; margin: 0 0 12px;
                  padding: 8px 10px; background: var(--bg); border-radius: 6px; max-height: 110px; overflow-y: auto; }
    .tot-filter label { font-size: 12px; color: var(--text); display: inline-flex;
                        align-items: center; gap: 5px; cursor: pointer; user-select: none; }
    .tot-filter input { accent-color: var(--text); }
    .tot-filter .actions { margin-left: auto; display: flex; gap: 6px; }
    .tot-filter .actions button { font-size: 11px; padding: 2px 8px; border-radius: 4px;
                                  border: 0.5px solid var(--border); background: var(--surface);
                                  color: var(--muted); cursor: pointer; font-family: inherit; }
    .tot-filter .actions button:hover { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <h1>FSFN Inventory</h1>
    <div style="display:flex; align-items:center;">
      <nav><a href="/">Dashboard</a><a href="/history">History</a><a href="/admin">Admin</a><a href="/simulator">Simulator</a><a href="/reconcile">Reconcile</a><a href="/import">Import</a></nav>
      <span id="last-updated">Loading…</span>
    </div>
  </header>

  <main>
    <div class="stat-row" id="stats">
      <div class="stat"><div class="stat-label">SKUs tracked</div><div class="stat-value" id="s-skus">—</div></div>
      <div class="stat"><div class="stat-label">Total weight on hand</div><div class="stat-value" id="s-weight">—</div><div class="stat-sub">across all sites</div></div>
      <div class="stat"><div class="stat-label">Low / out of stock</div><div class="stat-value" id="s-low" style="color:var(--amber)">—</div></div>
      <div class="stat"><div class="stat-label">Sales today</div><div class="stat-value" id="s-today">—</div></div>
      <div class="stat"><div class="stat-label">Sales all time</div><div class="stat-value" id="s-total">—</div><div class="stat-sub" id="s-txn"></div></div>
    </div>

    <section class="chart-card">
      <div class="section-header">
        <div class="toggle-group" id="ts-tabs">
          <button class="toggle-btn active" data-ts="cash">Cash flow</button>
          <button class="toggle-btn" data-ts="att">Foot traffic</button>
        </div>
        <div class="controls" id="ts-controls">
          <!-- per-tab controls swapped in by JS -->
        </div>
      </div>
      <div class="chart-wrap"><canvas id="ts-chart"></canvas></div>
    </section>

    <section class="chart-card">
      <div class="section-header">
        <div class="section-title">Totals</div>
        <div class="controls">
          <div class="toggle-group" id="tot-metric">
            <button class="toggle-btn active" data-metric="quantity">Quantity</button>
            <button class="toggle-btn" data-metric="weight">Weight (lbs)</button>
          </div>
          <div class="toggle-group" id="tot-segment">
            <button class="toggle-btn active" data-segment="item">By item</button>
            <button class="toggle-btn" data-segment="site">By site</button>
          </div>
        </div>
      </div>
      <div id="tot-filter" class="tot-filter"></div>
      <div class="chart-wrap" style="height:340px;"><canvas id="tot-chart"></canvas></div>
    </section>

    <section>
      <div class="section-header">
        <div class="section-title">Current inventory</div>
        <a href="/api/inventory.csv" class="toggle-btn" style="text-decoration:none; padding:5px 10px; background:var(--bg);">Download CSV</a>
      </div>
      <div class="inv-grid" id="inv-grid"><p class="empty">Loading…</p></div>
    </section>

    <section>
      <div class="section-header">
        <div class="section-title">Tables</div>
        <div class="controls">
          <div class="toggle-group" id="tbl-tabs">
            <button class="toggle-btn active" data-tbl="sales">Sales</button>
            <button class="toggle-btn" data-tbl="attendance">Attendance</button>
            <button class="toggle-btn" data-tbl="batches">Batches</button>
            <button class="toggle-btn" data-tbl="adjustments">Adjustments</button>
          </div>
          <a id="tbl-csv" href="/api/sales.csv" class="toggle-btn" style="text-decoration:none; padding:5px 10px; background:var(--bg);">Download CSV</a>
        </div>
      </div>
      <div id="tbl-body" class="chart-card" style="padding:0; overflow:hidden;"><p class="empty" style="padding:1rem;">Loading…</p></div>
    </section>
  </main>

  <script>
    const LOW_THRESHOLD = 5;
    const PALETTE = FSFN.PALETTE;

    function fmt(n) { return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n); }
    function fmtTime(iso) {
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      const diff = Math.round((Date.now() - d)/1000);
      if (diff < 60)  return `${diff}s ago`;
      if (diff < 3600) return `${Math.round(diff/60)}m ago`;
      if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
      return d.toLocaleDateString();
    }

    function statusClass(qty) {
      if (qty === 0) return 'out';
      if (qty <= LOW_THRESHOLD) return 'low';
      return 'ok';
    }

    // Chart instances
    let tsChart  = null;
    let totChart = null;

    // Filter state
    const state = {
      tsTab: 'cash',
      cash: { days: 30, bucket: 'day', site: '' },
      tot:  { metric: 'quantity', segment: 'item', excluded: new Set() },
      att:  { days: 90, bucket: 'week', site: '' },
    };

    function wireToggleGroup(id, key, attr, onChange) {
      const group = document.getElementById(id);
      group.addEventListener('click', e => {
        const btn = e.target.closest('button[data-' + attr + ']');
        if (!btn) return;
        [...group.querySelectorAll('.toggle-btn')].forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state[key][attr] = btn.dataset[attr];
        onChange();
      });
    }

    // --- Time-series tabs (cash flow + foot traffic) ---
    const TS_CONFIG = {
      cash: {
        title: 'Cash flow',
        endpoint: '/api/cashflow',
        ranges: [['7d', 7], ['30d', 30, true], ['90d', 90]],
        buckets: [['Hour', 'hour'], ['Day', 'day', true], ['Week', 'week']],
        yFmt: v => '$' + v,
        tipFmt: ctx => `${ctx.dataset.label}: $${ctx.parsed.y}`,
      },
      att: {
        title: 'Foot traffic',
        endpoint: '/api/attendance',
        ranges: [['30d', 30], ['90d', 90, true], ['1y', 365]],
        buckets: [['Day', 'day'], ['Week', 'week', true], ['Month', 'month']],
        yFmt: v => v,
        tipFmt: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} people`,
      },
    };

    function renderTsControls() {
      const tab = state.tsTab;
      const cfg = TS_CONFIG[tab];
      const s   = state[tab];
      const ctrl = document.getElementById('ts-controls');
      ctrl.innerHTML = `
        <select class="filter" id="ts-site"><option value="">All sites</option></select>
        <div class="toggle-group" id="ts-range">
          ${cfg.ranges.map(([lbl, days]) => `<button class="toggle-btn ${s.days === days ? 'active' : ''}" data-days="${days}">${lbl}</button>`).join('')}
        </div>
        <div class="toggle-group" id="ts-bucket">
          ${cfg.buckets.map(([lbl, b]) => `<button class="toggle-btn ${s.bucket === b ? 'active' : ''}" data-bucket="${b}">${lbl}</button>`).join('')}
        </div>
      `;
      // Populate sites dropdown
      loadSitesInto('ts-site', s.site);

      document.getElementById('ts-range').addEventListener('click', e => {
        const b = e.target.closest('button[data-days]'); if (!b) return;
        state[tab].days = +b.dataset.days;
        renderTsControls(); loadTimeSeries();
      });
      document.getElementById('ts-bucket').addEventListener('click', e => {
        const b = e.target.closest('button[data-bucket]'); if (!b) return;
        state[tab].bucket = b.dataset.bucket;
        renderTsControls(); loadTimeSeries();
      });
      document.getElementById('ts-site').addEventListener('change', e => {
        state[tab].site = e.target.value;
        loadTimeSeries();
      });
    }

    async function loadSitesInto(selectId, currentValue) {
      const sel = document.getElementById(selectId);
      if (!sel) return;
      const sites = await fetch('/api/sites').then(r => r.json());
      sel.innerHTML = '<option value="">All sites</option>' +
        sites.map(s => `<option value="${s.canonical}">${s.canonical}</option>`).join('');
      sel.value = currentValue || '';
    }

    async function loadTimeSeries() {
      const tab = state.tsTab;
      const cfg = TS_CONFIG[tab];
      const s   = state[tab];
      const params = new URLSearchParams({ bucket: s.bucket, since_days: s.days });
      if (s.site) params.set('site', s.site);
      const rows = await fetch(`${cfg.endpoint}?${params}`).then(r => r.json());
      const data = FSFN.pivotBucketed(rows);
      if (tsChart) tsChart.destroy();
      tsChart = new Chart(document.getElementById('ts-chart'), {
        type: 'line',
        data,
        options: FSFN.baseChartOptions({
          plugins: { tooltip: { callbacks: { label: cfg.tipFmt } } },
          scales: { y: { ticks: { callback: cfg.yFmt } } },
        }),
      });
    }

    document.getElementById('ts-tabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-ts]'); if (!btn) return;
      [...document.querySelectorAll('#ts-tabs .toggle-btn')].forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.tsTab = btn.dataset.ts;
      renderTsControls(); loadTimeSeries();
    });

    // --- Totals (bar) with item/site include checkboxes ---
    let totsLastRows = [];

    function renderTotFilter(rows) {
      const el = document.getElementById('tot-filter');
      if (!rows.length) { el.innerHTML = ''; return; }
      const labels = rows.map(r => r.label);
      const cbs = labels.map(l => {
        const checked = state.tot.excluded.has(l) ? '' : 'checked';
        return `<label><input type="checkbox" data-label="${l}" ${checked}/>${l}</label>`;
      }).join('');
      el.innerHTML = cbs + `
        <span class="actions">
          <button data-act="all">All</button>
          <button data-act="none">None</button>
        </span>`;
      el.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', e => {
          const lbl = e.target.dataset.label;
          if (e.target.checked) state.tot.excluded.delete(lbl);
          else                  state.tot.excluded.add(lbl);
          drawTotals();
        });
      });
      el.querySelectorAll('button[data-act]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.act === 'all')  state.tot.excluded.clear();
          else                            labels.forEach(l => state.tot.excluded.add(l));
          renderTotFilter(rows); drawTotals();
        });
      });
    }

    function drawTotals() {
      const rows = totsLastRows.filter(r => !state.tot.excluded.has(r.label));
      const labels = rows.map(r => r.label);
      const values = rows.map(r => r.value);
      if (totChart) totChart.destroy();
      totChart = new Chart(document.getElementById('tot-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: state.tot.metric === 'weight' ? 'lbs' : 'qty',
            data: values,
            backgroundColor: labels.map((_, i) => PALETTE[i % PALETTE.length]),
            borderWidth: 0,
            borderRadius: 4,
          }],
        },
        options: FSFN.baseChartOptions({
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { callback: v => state.tot.metric === 'weight' ? v + ' lb' : v } },
            x: { ticks: { maxRotation: 60, minRotation: 45, autoSkip: false, font: { size: 10 } } },
          },
        }),
      });
    }

    async function loadTotals() {
      const { metric, segment } = state.tot;
      const rows = await fetch(`/api/totals?metric=${metric}&segment=${segment}`).then(r => r.json());
      totsLastRows = rows;
      // Reset exclusions when segment changes so old labels don't persist
      const valid = new Set(rows.map(r => r.label));
      for (const e of [...state.tot.excluded]) if (!valid.has(e)) state.tot.excluded.delete(e);
      renderTotFilter(rows);
      drawTotals();
    }

    // (Sites are loaded per-tab inside renderTsControls now.)

    async function loadDashboard() {
      const [inv, sales] = await Promise.all([
        fetch('/api/inventory').then(r => r.json()),
        fetch('/api/sales').then(r => r.json()),
      ]);

      // Stats
      const low = inv.filter(i => i.quantity <= LOW_THRESHOLD).length;
      const totalWeight = inv.reduce((a, i) => a + (i.total_weight_lbs || 0), 0);
      document.getElementById('s-skus').textContent = inv.length;
      document.getElementById('s-weight').innerHTML = totalWeight.toFixed(0) + '<span style="font-size:13px;color:var(--muted);"> lbs</span>';
      document.getElementById('s-low').textContent = low;
      document.getElementById('s-low').style.color = low > 0 ? 'var(--amber)' : 'var(--green)';
      document.getElementById('s-today').textContent = fmt(sales.today_usd);
      document.getElementById('s-total').textContent = fmt(sales.total_usd);
      document.getElementById('s-txn').textContent = `${sales.transaction_count} transactions`;

      // Inventory grid
      const maxQty = Math.max(...inv.map(i => i.quantity), 1);
      const grid = document.getElementById('inv-grid');
      if (!inv.length) { grid.innerHTML = '<p class="empty">No inventory recorded yet.</p>'; }
      else {
        grid.innerHTML = inv.map(i => {
          const s = statusClass(i.quantity);
          const pct = Math.round((i.quantity / maxQty) * 100);
          const badge = s === 'out' ? '<span class="badge badge-out">out</span>'
                      : s === 'low' ? '<span class="badge badge-low">low</span>' : '';
          const weight = i.total_weight_lbs > 0
              ? `<div class="inv-weight">${i.total_weight_lbs.toFixed(1)} lbs total</div>`
              : '';
          const href = '/item/' + encodeURIComponent(i.item);
          return `
            <a class="inv-card" style="display:block; text-decoration:none; color:inherit;" href="${href}">
              <div class="inv-item">${i.item}${badge}</div>
              <div class="inv-time">${fmtTime(i.updated_at)}</div>
              <div class="inv-qty qty-${s}">${i.quantity}<span class="inv-unit">${i.unit}</span></div>
              ${weight}
              <div class="bar-wrap"><div class="bar bar-${s}" style="width:${pct}%"></div></div>
            </a>`;
        }).join('');
      }

      document.getElementById('last-updated').textContent = `Updated ${fmtTime(new Date().toISOString().slice(0,19))}`;
    }

    // -------- Tabbed tables (replaces the SMS feed area) --------
    const TABLES = {
      sales: {
        endpoint: '/api/sales/list',
        csv: '/api/sales.csv',
        columns: [
          { label: 'When',   key: 'recorded_at', fmt: fmtTime },
          { label: 'Site',   key: 'site' },
          { label: 'Amount', key: 'amount_usd', cls: 'num', fmt: v => fmt(v) },
          { label: 'Note',   key: 'note' },
        ],
      },
      attendance: {
        endpoint: '/api/attendance/list',
        csv: '/api/attendance.csv',
        columns: [
          { label: 'When',   key: 'recorded_at', fmt: fmtTime },
          { label: 'Site',   key: 'site' },
          { label: 'People', key: 'people_count', cls: 'num' },
          { label: 'Note',   key: 'note' },
        ],
      },
      batches: {
        endpoint: '/api/batches',
        csv: '/api/batches.csv',
        columns: [
          { label: 'Received', key: 'received_at', fmt: fmtTime },
          { label: 'Item',     key: 'item' },
          { label: 'Site',     key: 'site' },
          { label: 'Quantity', key: 'quantity', cls: 'num' },
          { label: 'Weight',   key: 'weight_lbs', cls: 'num', fmt: v => v != null ? v.toFixed(1) + ' lbs' : '—' },
          { label: 'Quality',  key: 'quality_score', cls: 'num', fmt: v => v != null ? v + '/5' : '—' },
        ],
      },
      adjustments: {
        endpoint: '/api/adjustments',
        csv: '/api/adjustments.csv',
        columns: [
          { label: 'When',   key: 'recorded_at', fmt: fmtTime },
          { label: 'Item',   key: 'item' },
          { label: 'Kind',   key: 'kind' },
          { label: 'Δ qty',  key: 'delta_quantity', cls: 'num', fmt: v => v > 0 ? '+' + v : v },
          { label: 'Amount', key: 'amount_usd', cls: 'num', fmt: v => v != null ? fmt(v) : '—' },
          { label: 'To',     key: 'recipient', fmt: v => v || '—' },
          { label: 'Note',   key: 'note' },
        ],
      },
    };

    let activeTbl = 'sales';

    async function loadTable() {
      const cfg = TABLES[activeTbl];
      document.getElementById('tbl-csv').href = cfg.csv;
      const rows = await fetch(cfg.endpoint + '?limit=25').then(r => r.json());
      const el = document.getElementById('tbl-body');
      if (!rows.length) { el.innerHTML = '<p class="empty" style="padding:1rem;">No rows.</p>'; return; }
      const tdfmt = (col, v) => {
        if (v == null || v === '') return '<span style="color:var(--hint)">—</span>';
        return col.fmt ? col.fmt(v) : v;
      };
      el.innerHTML = `
        <table style="width:100%; border-collapse:separate; border-spacing:0;">
          <thead>
            <tr>${cfg.columns.map(c => `<th style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; text-align:${c.cls === 'num' ? 'right' : 'left'}; padding:9px 12px; border-bottom:0.5px solid var(--border); background:var(--bg);">${c.label}</th>`).join('')}</tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>${cfg.columns.map(c => `<td style="font-size:12px; padding:8px 12px; border-bottom:0.5px solid var(--border); text-align:${c.cls === 'num' ? 'right' : 'left'}; font-variant-numeric:${c.cls === 'num' ? 'tabular-nums' : 'normal'};">${tdfmt(c, r[c.key])}</td>`).join('')}</tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    document.getElementById('tbl-tabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-tbl]');
      if (!btn) return;
      [...document.querySelectorAll('#tbl-tabs .toggle-btn')].forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTbl = btn.dataset.tbl;
      loadTable();
    });

    function refreshAll() {
      loadDashboard();
      loadTimeSeries();
      loadTotals();
      loadTable();
    }

    wireToggleGroup('tot-metric', 'tot', 'metric', loadTotals);
    wireToggleGroup('tot-segment', 'tot', 'segment', loadTotals);

    renderTsControls();
    refreshAll();
    setInterval(refreshAll, 30_000);
  </script>
</body>
</html>
