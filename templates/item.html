<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Item · FSFN Inventory</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/static/charts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f8f7f4; --surface:#fff; --border:rgba(0,0,0,0.1);
      --text:#1a1a18; --muted:#6b6b67; --hint:#9a9a96;
      --green:#1D9E75; --amber:#BA7517; --red:#E24B4A; --blue:#185FA5;
      --green-bg:#EAF3DE; --amber-bg:#FAEEDA; --red-bg:#FCEBEB; --blue-bg:#E6F1FB;
      --radius:10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

    header { background: var(--surface); border-bottom: 0.5px solid var(--border);
             padding: 0 1.5rem; height: 52px; display: flex; align-items: center;
             justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 15px; font-weight: 500; }
    header nav a { font-size: 12px; color: var(--muted); margin-left: 1rem; text-decoration: none; }
    header nav a:hover { color: var(--text); }

    main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

    .back { font-size: 12px; color: var(--muted); text-decoration: none; }
    .back:hover { color: var(--text); }

    h2 { font-size: 24px; font-weight: 500; margin: 0.5rem 0 0.25rem; }
    .item-meta { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
    .item-meta .alias { background: var(--bg); padding: 1px 6px; border-radius: 4px; margin-right: 4px; font-size: 11px; }

    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px; margin-bottom: 1.75rem; }
    .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 0.875rem 1rem; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                  letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .stat-sub    { font-size: 11px; color: var(--hint); margin-top: 3px; }

    section + section { margin-top: 2rem; }
    .section-title { font-size: 11px; font-weight: 500; color: var(--muted);
                     text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

    table { width: 100%; background: var(--surface); border: 0.5px solid var(--border);
            border-radius: var(--radius); border-collapse: separate; border-spacing: 0; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; font-size: 13px;
             border-bottom: 0.5px solid var(--border); }
    th { font-weight: 500; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg); }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .quality { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .q5 { background: var(--green-bg); color: var(--green); }
    .q4 { background: var(--green-bg); color: var(--green); }
    .q3 { background: var(--amber-bg); color: var(--amber); }
    .q2 { background: var(--amber-bg); color: var(--amber); }
    .q1 { background: var(--red-bg); color: var(--red); }
    .q-none { color: var(--hint); font-size: 11px; }

    .empty { color: var(--hint); font-size: 13px; padding: 1rem 0; }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
    .controls { display: flex; gap: 6px; align-items: center; }
    .toggle-group { display: inline-flex; background: var(--bg); border-radius: 6px; padding: 2px; }
    .toggle-btn { font-size: 11px; padding: 4px 10px; border: none; background: transparent;
                  color: var(--muted); cursor: pointer; border-radius: 4px; font-family: inherit; }
    .toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 0.5px 1px rgba(0,0,0,0.08); }
    .chart-card { background: var(--surface); border: 0.5px solid var(--border);
                  border-radius: var(--radius); padding: 1rem; }
    .chart-wrap { position: relative; height: 280px; }

    .adj-card { background: var(--surface); border: 0.5px solid var(--border);
                border-radius: var(--radius); padding: 1rem; }
    .adj-tabs { display: inline-flex; background: var(--bg); border-radius: 6px; padding: 2px; margin-bottom: 1rem; }
    .adj-tab  { font-size: 12px; padding: 5px 12px; border: none; background: transparent;
                color: var(--muted); cursor: pointer; border-radius: 4px; font-family: inherit; }
    .adj-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 0.5px 1px rgba(0,0,0,0.08); }
    .adj-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .adj-form-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .adj-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 6px 0 3px; }
    .adj-input { width: 100%; font-family: inherit; font-size: 13px; padding: 6px 9px;
                 border: 0.5px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); }
    .adj-input:focus { outline: none; border-color: var(--text); }
    .adj-btn { font-family: inherit; font-size: 13px; padding: 7px 14px; border-radius: 6px; cursor: pointer;
               background: var(--text); color: white; border: none; margin-top: 0.75rem; }
    .adj-btn:hover { background: #000; }
    .adj-hint { color: var(--hint); font-size: 11px; margin-top: 0.5rem; }

    .kind-correction { background: var(--blue-bg); color: var(--blue); }
    .kind-waste { background: var(--red-bg); color: var(--red); }
    .kind-sold  { background: var(--green-bg); color: var(--green); }

    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: white;
             padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 100; }
    .toast.show { opacity: 0.95; }
  </style>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header>
    <h1>FSFN Inventory</h1>
    <nav><a href="/">Dashboard</a><a href="/inventory">Inventory</a><a href="/history">History</a><a href="/admin">Admin</a><a href="/simulator">Simulator</a><a href="/reconcile">Reconcile</a><a href="/import">Import</a></nav>
  </header>

  <main>
    <a class="back" href="/">← Back to dashboard</a>
    <div id="content"><p class="empty">Loading…</p></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const canonical = decodeURIComponent(location.pathname.replace(/^\/item\//, ''));
    const PALETTE = FSFN.PALETTE;
    let histChart = null;
    const histState = { metric: 'quantity', bucket: 'day', days: 90 };

    function fmtTime(iso) {
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      return d.toLocaleString();
    }

    function qualityCell(q) {
      if (q == null) return '<span class="q-none">—</span>';
      const rounded = Math.max(1, Math.round(q));
      return `<span class="quality q${rounded}">${(+q).toFixed(1)}/5</span>`;
    }

    async function loadHistory() {
      const { metric, bucket, days } = histState;
      const params = new URLSearchParams({ metric, bucket, since_days: days });
      const rows = await fetch(`/api/item/${encodeURIComponent(canonical)}/history?${params}`).then(r => r.json());
      const data = FSFN.pivotBucketed(rows);
      if (histChart) histChart.destroy();
      const canvas = document.getElementById('hist-chart');
      if (!canvas) return;
      histChart = new Chart(canvas, {
        type: 'line',
        data,
        options: FSFN.baseChartOptions({
          plugins: { tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}${metric === 'weight' ? ' lbs' : ''}` } } },
          scales: { y: { ticks: { callback: v => metric === 'weight' ? v + ' lb' : v } } },
        }),
      });
    }

    function wireToggle(id, attr, onChange) {
      const group = document.getElementById(id);
      if (!group) return;
      group.addEventListener('click', e => {
        const btn = e.target.closest('button[data-' + attr + ']');
        if (!btn) return;
        [...group.querySelectorAll('.toggle-btn')].forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        histState[attr] = isNaN(+btn.dataset[attr]) ? btn.dataset[attr] : +btn.dataset[attr];
        onChange();
      });
    }

    async function load() {
      const r = await fetch('/api/item/' + encodeURIComponent(canonical));
      if (!r.ok) {
        document.getElementById('content').innerHTML = `<p class="empty">Item "${canonical}" not found.</p>`;
        return;
      }
      const d = await r.json();
      const reg = d.registry;
      const cur = d.current;
      const aliases = reg?.aliases?.map(a => `<span class="alias">${a}</span>`).join('') || '';

      const degradeSub = reg?.degrade_per_day
          ? `-${reg.degrade_per_day}/day degrade`
          : 'shelf-stable';

      const avgInitial = d.avg_initial_quality;
      const avgCurrent = d.avg_quality;

      const stats = `
        <div class="stat-row">
          <div class="stat">
            <div class="stat-label">Current quantity</div>
            <div class="stat-value">${cur ? cur.quantity : 0}<span style="font-size:13px;color:var(--muted);"> ${cur?.unit || reg?.unit || 'units'}</span></div>
            <div class="stat-sub">${cur ? 'Updated ' + fmtTime(cur.updated_at) : 'no current row'}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total weight on hand</div>
            <div class="stat-value">${d.total_weight_lbs.toFixed(1)}<span style="font-size:13px;color:var(--muted);"> lbs</span></div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg quality (now)</div>
            <div class="stat-value">${avgCurrent == null ? '—' : avgCurrent + ' / 5'}</div>
            <div class="stat-sub">${avgInitial != null ? 'as received: ' + avgInitial + ' / 5' : ''} · ${degradeSub}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Batches received</div>
            <div class="stat-value">${d.batches.length}</div>
          </div>
        </div>`;

      const rows = d.batches.map(b => {
        const ageCell = b.days_old != null ? `${b.days_old.toFixed(1)}d` : '<span class="q-none">—</span>';
        const qualityCol = b.current_quality != null
            ? `${qualityCell(b.current_quality)} <span style="color:var(--hint); font-size:11px;">(from ${b.quality_score})</span>`
            : qualityCell(b.quality_score);
        return `
        <tr>
          <td>${fmtTime(b.received_at)}</td>
          <td>${b.site}</td>
          <td class="num">${b.quantity} ${b.unit}</td>
          <td class="num">${b.weight_lbs != null ? b.weight_lbs.toFixed(1) + ' lbs' : '<span class="q-none">—</span>'}</td>
          <td class="num">${ageCell}</td>
          <td>${qualityCol}</td>
          <td style="color:var(--muted)">${b.note || ''}</td>
        </tr>`;
      }).join('');

      const table = d.batches.length ? `
        <table>
          <thead>
            <tr><th>Received</th><th>Site</th><th class="num">Quantity</th><th class="num">Weight</th><th class="num">Age</th><th>Quality</th><th>Note</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>` : '<p class="empty">No batch history yet.</p>';

      const adjCard = `
        <section class="adj-card">
          <div class="section-header">
            <div class="section-title">Adjust inventory</div>
            <div class="adj-tabs" id="adj-tabs">
              <button class="adj-tab active" data-kind="correction">Correction</button>
              <button class="adj-tab" data-kind="waste">Waste</button>
              <button class="adj-tab" data-kind="sold">Sold / given</button>
            </div>
          </div>
          <div id="adj-form-body"></div>
          <div class="adj-hint" id="adj-hint"></div>
        </section>`;

      const historyCard = `
        <section class="chart-card">
          <div class="section-header">
            <div class="section-title">Receipt history (by site)</div>
            <div class="controls">
              <div class="toggle-group" id="hist-metric">
                <button class="toggle-btn active" data-metric="quantity">Quantity</button>
                <button class="toggle-btn" data-metric="weight">Weight</button>
              </div>
              <div class="toggle-group" id="hist-bucket">
                <button class="toggle-btn active" data-bucket="day">Day</button>
                <button class="toggle-btn" data-bucket="week">Week</button>
                <button class="toggle-btn" data-bucket="month">Month</button>
              </div>
              <div class="toggle-group" id="hist-range">
                <button class="toggle-btn" data-days="30">30d</button>
                <button class="toggle-btn active" data-days="90">90d</button>
                <button class="toggle-btn" data-days="365">1y</button>
              </div>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
        </section>`;

      document.getElementById('content').innerHTML = `
        <h2>${d.canonical}</h2>
        <div class="item-meta">
          ${reg ? `Registered unit: <strong>${reg.unit}</strong>` : 'Not in registry'}
          ${reg?.weight_per_unit ? ` · ${reg.weight_per_unit} lbs/${reg.unit.replace(/s$/, '')} (estimated)` : ''}
          ${aliases ? '<div style="margin-top:6px;">Aliases: ' + aliases + '</div>' : ''}
        </div>
        ${stats}
        ${historyCard}
        <section style="margin-top:2rem;">
          ${adjCard}
        </section>
        <section style="margin-top:2rem;">
          <div class="section-header">
            <div class="section-title">Adjustment history</div>
            <a href="/api/adjustments.csv?item=${encodeURIComponent(d.canonical)}" class="toggle-btn" style="text-decoration:none; padding:5px 10px; background:var(--bg);">Download CSV</a>
          </div>
          <div id="adj-history"><p class="empty">Loading…</p></div>
        </section>
        <section style="margin-top:2rem;">
          <div class="section-header">
            <div class="section-title">Batches received</div>
            <a href="/api/batches.csv?item=${encodeURIComponent(d.canonical)}" class="toggle-btn" style="text-decoration:none; padding:5px 10px; background:var(--bg);">Download CSV</a>
          </div>
          ${table}
        </section>`;

      wireToggle('hist-metric', 'metric', loadHistory);
      wireToggle('hist-bucket', 'bucket', loadHistory);
      wireToggle('hist-range',  'days',   loadHistory);
      loadHistory();
      wireAdjustTabs();
      renderAdjForm('correction');
      loadAdjustmentHistory();
    }

    // -------- Adjustment form --------
    const ADJ_HINTS = {
      correction: 'Use negative numbers to subtract, positive to add back. For "wrong parse" fixes.',
      waste:      'Quantity will be subtracted from inventory. Spoilage, expired, dropped, etc.',
      sold:       'Quantity is subtracted; if you enter an amount, a sale is logged too.',
    };

    function renderAdjForm(kind) {
      const body = document.getElementById('adj-form-body');
      const isSold = kind === 'sold';
      body.innerHTML = `
        <div class="adj-form-row ${isSold ? 'three' : ''}">
          <div>
            <div class="adj-label">${kind === 'correction' ? 'Delta quantity (+/-)' : 'Quantity'}</div>
            <input class="adj-input" id="adj-qty" type="number" step="1" placeholder="${kind === 'correction' ? '-5 or +5' : '5'}" />
          </div>
          <div>
            <div class="adj-label">Weight delta (lbs, optional)</div>
            <input class="adj-input" id="adj-weight" type="number" step="0.1" />
          </div>
          ${isSold ? `<div>
            <div class="adj-label">Amount (USD)</div>
            <input class="adj-input" id="adj-amount" type="number" step="0.01" placeholder="0.00" />
          </div>` : ''}
        </div>
        <div class="adj-form-row">
          ${isSold ? `<div>
            <div class="adj-label">Sold/given to</div>
            <input class="adj-input" id="adj-recipient" placeholder="e.g. Jane's restaurant" />
          </div>` : '<div></div>'}
          <div>
            <div class="adj-label">Note</div>
            <input class="adj-input" id="adj-note" placeholder="optional" />
          </div>
        </div>
        <div class="adj-form-row">
          <div>
            <div class="adj-label">Site</div>
            <select class="adj-input" id="adj-site"><option value="">(unassigned)</option></select>
          </div>
          <div style="align-self:end;">
            <button class="adj-btn" id="adj-submit">Apply ${kind}</button>
          </div>
        </div>
      `;
      document.getElementById('adj-hint').textContent = ADJ_HINTS[kind];
      document.getElementById('adj-submit').dataset.kind = kind;
      document.getElementById('adj-submit').addEventListener('click', submitAdjustment);
      loadSitesIntoSelect('adj-site');
    }

    function wireAdjustTabs() {
      document.getElementById('adj-tabs').addEventListener('click', e => {
        const btn = e.target.closest('button[data-kind]');
        if (!btn) return;
        [...document.querySelectorAll('.adj-tab')].forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAdjForm(btn.dataset.kind);
      });
    }

    async function loadSitesIntoSelect(id) {
      const sel = document.getElementById(id);
      const sites = await fetch('/api/sites').then(r => r.json());
      sel.innerHTML = '<option value="">(unassigned)</option>' +
        sites.map(s => `<option value="${s.canonical}">${s.canonical}</option>`).join('');
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    async function submitAdjustment(e) {
      const kind = e.currentTarget.dataset.kind;
      const payload = {
        kind,
        delta_quantity:    document.getElementById('adj-qty').value || 0,
        delta_weight_lbs:  document.getElementById('adj-weight').value || null,
        note:              document.getElementById('adj-note').value || null,
        site:              document.getElementById('adj-site').value || null,
      };
      if (kind === 'sold') {
        payload.amount_usd = document.getElementById('adj-amount').value || null;
        payload.recipient  = document.getElementById('adj-recipient').value || null;
      }
      const r = await fetch(`/api/item/${encodeURIComponent(canonical)}/adjust`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
      if (r.status === 401) { location.href = '/login?next=' + encodeURIComponent(location.pathname); return; }
      const j = await r.json();
      if (r.ok) {
        toast(`${kind} applied (delta ${j.delta_quantity})`);
        await load();  // refresh stats + tables
      } else {
        toast('Error: ' + (j.detail || r.statusText));
      }
    }

    async function loadAdjustmentHistory() {
      const rows = await fetch(`/api/item/${encodeURIComponent(canonical)}/adjustments`).then(r => r.json());
      const el = document.getElementById('adj-history');
      if (!el) return;
      if (!rows.length) { el.innerHTML = '<p class="empty">No adjustments yet.</p>'; return; }
      const trs = rows.map(a => `
        <tr>
          <td>${fmtTime(a.recorded_at)}</td>
          <td><span class="quality kind-${a.kind}">${a.kind}</span></td>
          <td class="num">${a.delta_quantity > 0 ? '+' : ''}${a.delta_quantity}</td>
          <td class="num">${a.delta_weight_lbs != null ? (a.delta_weight_lbs > 0 ? '+' : '') + a.delta_weight_lbs.toFixed(1) + ' lbs' : '<span class="q-none">—</span>'}</td>
          <td class="num">${a.amount_usd != null ? '$' + a.amount_usd.toFixed(2) : '<span class="q-none">—</span>'}</td>
          <td>${a.recipient || '<span class="q-none">—</span>'}</td>
          <td>${a.site}</td>
          <td style="color:var(--muted)">${a.note || ''}</td>
        </tr>`).join('');
      el.innerHTML = `
        <table>
          <thead><tr><th>When</th><th>Kind</th><th class="num">Δ qty</th><th class="num">Δ weight</th><th class="num">Amount</th><th>To</th><th>Site</th><th>Note</th></tr></thead>
          <tbody>${trs}</tbody>
        </table>`;
    }

    load();
  </script>
</body>
</html>
